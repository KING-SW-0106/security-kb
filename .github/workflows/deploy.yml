# 每次推送代码，自动构建并部署到 GitHub Pages
# 不需要手动操作，推代码就自动更新手机上的网站

name: 自动部署知识库
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 安装依赖
        run: pip install mkdocs-material

      - name: 构建 + 部署
        run: mkdocs gh-deploy --force
